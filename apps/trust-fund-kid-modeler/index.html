<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trust Fund Kid Modeler · Smirking Cat Software</title>
    <link rel="icon" href="/public/images/smirk-cat.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/public/css/theme.css" />
    <link rel="stylesheet" href="/src/styles/calculator.css" />
  </head>
  <body>
    <div class="page page--wide">
      <header class="site-header no-print">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <img src="/public/images/smirk-cat.png" alt="" width="60" height="60" />
          </div>
          <div class="brand-text">
            <p class="brand-title">Smirking Cat Software</p>
            <p class="brand-subtitle">Separate-share Crummey funding model</p>
          </div>
        </div>
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="/">All apps</a>
        </nav>
      </header>

      <main>
        <section class="hero no-print">
          <h1>Trust Fund Kid Modeler</h1>
          <p class="hero-synopsis" id="hero-synopsis"></p>
          <ul class="hero-attributes" id="hero-attributes"></ul>
        </section>

        <section class="card card--inputs no-print" aria-labelledby="inputs-heading">
          <h2 id="inputs-heading" class="card-heading">Your assumptions</h2>
          <form id="calculator-form">
            <div class="form-grid">
              <label>
                Starting age
                <input type="number" name="startingAge" min="0" max="17" step="1" value="0" />
                <span class="field-hint">Trump slices run from this age through 17</span>
              </label>
              <label>
                Inflation rate (%)
                <input type="number" name="cpiRate" min="0" max="20" step="0.1" value="3.0" />
                <span class="field-hint">Indexes real-dollar inputs each year</span>
              </label>
              <label>
                Nominal market return (%)
                <input type="number" name="marketRate" min="0" max="30" step="0.1" value="10.0" />
                <span class="field-hint">Annual return on trump, prefund, and brokerage</span>
              </label>
              <label>
                Brokerage target (real $)
                <input type="number" name="brokerageRealTarget" min="0" step="1" value="70000" />
                <span class="field-hint">Cumulative gift deposits in year-0 dollars</span>
              </label>
              <label>
                Trump annual slice (real $)
                <input type="number" name="trumpRealAnnual" min="0" step="1" value="5000" />
                <span class="field-hint">Inflation-indexed each year ($5,000 × 1.03^age)</span>
              </label>
              <label>
                Trump seed ($)
                <input type="number" name="trumpSeed" min="0" step="1" value="1000" />
                <span class="field-hint">One-time federal deposit at account open (nominal $)</span>
              </label>
              <label>
                Annual Crummey gift (real $)
                <input type="number" name="giftRealAnnual" min="0" step="1" value="35000" />
                <span class="field-hint">Full inflation-indexed gift each gift year</span>
              </label>
            </div>
          </form>
        </section>

        <section class="card card--results" aria-labelledby="results-heading">
          <div class="results-header">
            <h2 id="results-heading" class="card-heading">Results</h2>
            <p class="print-only-heading">Trust Fund Kid Modeler</p>
          </div>
          <div id="results"></div>
        </section>
      </main>

      <footer class="site-footer no-print">
        <p>Estimates only — not legal, tax, or financial advice.</p>
      </footer>
      <p class="print-only-footer">Estimates only — not legal, tax, or financial advice.</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
