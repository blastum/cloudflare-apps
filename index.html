<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>James's Web Apps</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        line-height: 1.5;
      }

      body {
        margin: 0 auto;
        max-width: 42rem;
        padding: 2rem 1.25rem 3rem;
      }

      h1 {
        font-size: 1.75rem;
        margin: 0 0 0.5rem;
      }

      p {
        color: CanvasText;
        opacity: 0.85;
      }

      ul {
        padding-left: 1.25rem;
      }

      li + li {
        margin-top: 0.5rem;
      }

      a {
        color: LinkText;
      }

      .placeholder {
        font-style: italic;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <h1>Web Apps</h1>
    <p>Small single-page tools hosted on Cloudflare Pages.</p>
    <ul id="app-list">
      <li class="placeholder">Apps will be listed here as they are added.</li>
    </ul>
  </body>
</html>
